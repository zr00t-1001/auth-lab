# Opt-in HashiCorp Vault layer.
#   docker compose -f docker-compose.yml -f docker-compose.vault.yml up --build
#
# Phase 1: JWT signing keys come from Vault's KV store (USE_VAULT).
# Phase 2: the DB password/user are SHORT-LIVED credentials issued per boot by
#          Vault's database secrets engine, with the lease auto-renewed
#          (USE_VAULT_DB). Your plain `docker compose up` is unchanged.
services:
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    command: ["server", "-dev"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 3s
      timeout: 3s
      retries: 20

  vault-init:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
      db:
        condition: service_healthy   # the DB engine config connects to Postgres
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root-dev-token
      DB_PASS: "1234"                # the Postgres superuser pw Vault manages with
    entrypoint: ["sh", "/init.sh"]
    volumes:
      - ./vault/init.sh:/init.sh:ro
      - vault-creds:/vault/creds
    restart: "no"

  api:
    depends_on:
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      USE_VAULT: "true"
      USE_VAULT_DB: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID_FILE: /vault/creds/role_id
      VAULT_SECRET_ID_FILE: /vault/creds/secret_id
      VAULT_SECRET_PATH: secret/data/auth-lab
      VAULT_DB_ROLE: auth-lab
    volumes:
      - vault-creds:/vault/creds:ro

volumes:
  vault-creds:
