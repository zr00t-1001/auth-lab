# Opt-in HashiCorp Vault layer (Phase 1: static secrets via AppRole).
#
#   docker compose -f docker-compose.yml -f docker-compose.vault.yml up --build
#
# Your normal `docker compose up` is UNCHANGED and does not use Vault. With this
# overlay, the api fetches JWT signing keys + the DB password from Vault at boot
# (USE_VAULT=true) and ignores the plaintext secrets in the base compose file.
services:
  vault:
    image: hashicorp/vault:1.18
    cap_add:
      - IPC_LOCK
    command: ["server", "-dev"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-dev-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 3s
      timeout: 3s
      retries: 20

  vault-init:
    image: hashicorp/vault:1.18
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root-dev-token
      DB_PASS: "1234"            # must match the db service's POSTGRES_PASSWORD
    entrypoint: ["sh", "/init.sh"]
    volumes:
      - ./vault/init.sh:/init.sh:ro
      - vault-creds:/vault/creds
    restart: "no"

  api:
    depends_on:
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    environment:
      USE_VAULT: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID_FILE: /vault/creds/role_id
      VAULT_SECRET_ID_FILE: /vault/creds/secret_id
      VAULT_SECRET_PATH: secret/data/auth-lab
    volumes:
      - vault-creds:/vault/creds:ro

volumes:
  vault-creds:
