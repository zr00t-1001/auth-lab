name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  attack-sim:
    name: Attack-simulator defense regression
    runs-on: ubuntu-latest
    needs: test
    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "1234"
          POSTGRES_DB: auth_sys
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: "1234"
      DB_NAME: auth_sys
      DB_SYNC: "true"
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
      PORT: "3000"
      SEED_ON_BOOT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start API
        run: |
          node dist/src/main.js &
          echo $! > api.pid
      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null; then echo "API up"; exit 0; fi
            sleep 2
          done
          echo "API did not become healthy" >&2; exit 1
      - name: Run all attack scenarios (fails if a defense regresses)
        run: pnpm sim --all --target http://localhost:3000 --out reports/ci.json
      - name: Stop API
        if: always()
        run: kill "$(cat api.pid)" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sim-report
          path: reports/ci.json
