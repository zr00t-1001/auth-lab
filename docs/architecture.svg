<svg viewBox="0 0 1040 600" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,Consolas,monospace">
  <defs>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3fb950"/></marker>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ff5c5c"/></marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8b949e"/></marker>
    <marker id="ac" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/></marker>
  </defs>

  <rect x="0" y="0" width="1040" height="600" rx="16" fill="#0b0e14"/>
  <text x="32" y="46" fill="#3fb950" font-size="22" font-weight="700">auth-lab</text>
  <text x="138" y="46" fill="#8b949e" font-size="15">// request &amp; defense flow</text>

  <!-- Attack simulator -->
  <rect x="32" y="78" width="214" height="244" rx="10" fill="#11161f" stroke="#232a36"/>
  <text x="48" y="104" fill="#ffb000" font-size="13" font-weight="700">ATTACK SIMULATOR</text>
  <text x="48" y="134" fill="#c9d1d9" font-size="12">› refresh-race</text>
  <text x="48" y="158" fill="#c9d1d9" font-size="12">› token-reuse</text>
  <text x="48" y="182" fill="#c9d1d9" font-size="12">› session-hijack</text>
  <text x="48" y="206" fill="#c9d1d9" font-size="12">› fingerprint-spoof</text>
  <text x="48" y="230" fill="#c9d1d9" font-size="12">› brute-force</text>
  <text x="48" y="254" fill="#c9d1d9" font-size="12">› jwt-tamper</text>
  <line x1="48" y1="272" x2="230" y2="272" stroke="#232a36"/>
  <text x="48" y="298" fill="#3fb950" font-size="12">⇒ verdict: PASS / FAIL</text>

  <!-- reports -->
  <rect x="32" y="392" width="214" height="44" rx="8" fill="#0c1017" stroke="#232a36"/>
  <text x="139" y="419" fill="#8b949e" font-size="12" text-anchor="middle">reports/*.json</text>
  <line x1="139" y1="322" x2="139" y2="390" stroke="#8b949e" stroke-width="1.4" marker-end="url(#am)"/>
  <text x="150" y="362" fill="#8b949e" font-size="10">saved</text>

  <!-- Client / Dashboard -->
  <rect x="300" y="118" width="168" height="96" rx="10" fill="#11161f" stroke="#232a36"/>
  <text x="316" y="146" fill="#58a6ff" font-size="13" font-weight="700">CLIENT / DASHBOARD</text>
  <text x="316" y="170" fill="#8b949e" font-size="11">terminal UI</text>
  <text x="316" y="188" fill="#8b949e" font-size="11">reads sessions + events</text>

  <!-- attacks arrow -->
  <line x1="246" y1="150" x2="298" y2="150" stroke="#3fb950" stroke-width="1.6" marker-end="url(#ag)"/>
  <text x="248" y="140" fill="#3fb950" font-size="10">attacks</text>

  <!-- Pipeline -->
  <rect x="528" y="78" width="250" height="300" rx="10" fill="#11161f" stroke="#232a36"/>
  <text x="544" y="104" fill="#ffb000" font-size="13" font-weight="700">REQUEST PIPELINE</text>
  <text x="544" y="122" fill="#8b949e" font-size="10">NestJS guards, in order</text>

  <rect x="544" y="138" width="218" height="34" rx="6" fill="#0c1017" stroke="#232a36"/>
  <text x="556" y="160" font-size="11.5"><tspan fill="#3fb950">1 ·</tspan><tspan fill="#c9d1d9"> rate limit + lockout</tspan></text>
  <rect x="544" y="182" width="218" height="34" rx="6" fill="#0c1017" stroke="#232a36"/>
  <text x="556" y="204" font-size="11.5"><tspan fill="#3fb950">2 ·</tspan><tspan fill="#c9d1d9"> JWT auth — sig + JTI replay</tspan></text>
  <rect x="544" y="226" width="218" height="34" rx="6" fill="#0c1017" stroke="#232a36"/>
  <text x="556" y="248" font-size="11.5"><tspan fill="#3fb950">3 ·</tspan><tspan fill="#c9d1d9"> session binding + fingerprint</tspan></text>
  <rect x="544" y="270" width="218" height="34" rx="6" fill="#0c1017" stroke="#232a36"/>
  <text x="556" y="292" font-size="11.5"><tspan fill="#3fb950">4 ·</tspan><tspan fill="#c9d1d9"> zero-trust risk engine</tspan></text>
  <rect x="544" y="314" width="218" height="34" rx="6" fill="#0c1017" stroke="#232a36"/>
  <text x="556" y="336" font-size="11.5"><tspan fill="#3fb950">5 ·</tspan><tspan fill="#c9d1d9"> RBAC (roles)</tspan></text>

  <!-- HTTP+JWT arrow -->
  <line x1="468" y1="158" x2="526" y2="150" stroke="#58a6ff" stroke-width="1.6" marker-end="url(#ac)"/>
  <text x="470" y="140" fill="#58a6ff" font-size="10">HTTP + JWT</text>

  <!-- Handlers -->
  <rect x="820" y="116" width="190" height="74" rx="10" fill="#11161f" stroke="#232a36"/>
  <text x="836" y="146" fill="#3fb950" font-size="13" font-weight="700">HANDLERS</text>
  <text x="836" y="170" fill="#8b949e" font-size="11">auth · sessions · tokens</text>

  <!-- allowed arrow -->
  <line x1="778" y1="150" x2="818" y2="150" stroke="#3fb950" stroke-width="1.6" marker-end="url(#ag)"/>
  <text x="780" y="140" fill="#3fb950" font-size="10">allowed</text>

  <!-- Postgres cylinder -->
  <g>
    <path d="M865,308 a60,14 0 0 1 120,0 l0,64 a60,14 0 0 1 -120,0 Z" fill="#0c1017" stroke="#232a36"/>
    <ellipse cx="925" cy="308" rx="60" ry="14" fill="#0c1017" stroke="#232a36"/>
    <text x="925" y="352" fill="#58a6ff" font-size="12" text-anchor="middle">PostgreSQL</text>
  </g>
  <!-- persist arrow -->
  <line x1="915" y1="190" x2="915" y2="292" stroke="#8b949e" stroke-width="1.6" marker-end="url(#am)"/>
  <text x="922" y="245" fill="#8b949e" font-size="10">persist</text>

  <!-- Audit -->
  <rect x="528" y="430" width="250" height="86" rx="10" fill="#11161f" stroke="#232a36"/>
  <text x="544" y="458" fill="#ff5c5c" font-size="13" font-weight="700">SECURITY EVENTS</text>
  <text x="544" y="480" fill="#8b949e" font-size="11">append-only audit log</text>
  <text x="544" y="500" fill="#8b949e" font-size="10">BINDING_VIOLATION · ACCOUNT_LOCKED · …</text>

  <!-- denied/risk arrow -->
  <line x1="653" y1="378" x2="653" y2="428" stroke="#ff5c5c" stroke-width="1.6" marker-end="url(#ar)"/>
  <text x="662" y="408" fill="#ff5c5c" font-size="10">denied / risk</text>

  <!-- audit write to DB -->
  <line x1="778" y1="466" x2="888" y2="392" stroke="#8b949e" stroke-width="1.6" marker-end="url(#am)"/>
  <text x="800" y="445" fill="#8b949e" font-size="10">write</text>

  <!-- audit feeds dashboard -->
  <path d="M528,452 C420,452 384,300 384,216" fill="none" stroke="#8b949e" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#am)"/>
  <text x="398" y="360" fill="#8b949e" font-size="10">events feed</text>

  <!-- legend -->
  <line x1="32" y1="556" x2="58" y2="556" stroke="#3fb950" stroke-width="2"/>
  <text x="64" y="560" fill="#8b949e" font-size="11">allowed</text>
  <line x1="140" y1="556" x2="166" y2="556" stroke="#ff5c5c" stroke-width="2"/>
  <text x="172" y="560" fill="#8b949e" font-size="11">denied / audited</text>
  <text x="300" y="560" fill="#8b949e" font-size="11">— the simulator attacks the lab and scores whether each defense fired</text>
</svg>
