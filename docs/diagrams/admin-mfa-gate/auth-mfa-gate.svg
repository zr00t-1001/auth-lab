<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#5b6b7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#d9544e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="540" rx="10" fill="#0b0f14"/>
  <text x="40" y="40" fill="#19c37d" font-size="18" font-weight="600">Authorization — admin-MFA gate</text>
  <text x="40" y="62" fill="#8b98a5" font-size="12">RolesGuard requires admin endpoints to have role = admin AND mfaEnabled</text>

  <!-- step 1 -->
  <rect x="230" y="88" width="300" height="56" rx="8" fill="#10171f" stroke="#2a3441" stroke-width="1"/>
  <text x="380" y="112" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Request to an admin endpoint</text>
  <text x="380" y="130" fill="#8b98a5" font-size="11" text-anchor="middle">attack-range · all-sessions · all-events</text>
  <line x1="380" y1="144" x2="380" y2="170" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 2 -->
  <rect x="230" y="170" width="300" height="56" rx="8" fill="#10171f" stroke="#2a3441" stroke-width="1"/>
  <text x="380" y="194" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">JwtAuthGuard</text>
  <text x="380" y="212" fill="#8b98a5" font-size="11" text-anchor="middle">valid access token?</text>
  <line x1="530" y1="198" x2="558" y2="198" stroke="#d9544e" stroke-width="1.5" marker-end="url(#arRed)"/>
  <line x1="380" y1="226" x2="380" y2="252" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 3 -->
  <rect x="230" y="252" width="300" height="56" rx="8" fill="#10171f" stroke="#2a3441" stroke-width="1"/>
  <text x="380" y="276" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">RolesGuard — role check</text>
  <text x="380" y="294" fill="#8b98a5" font-size="11" text-anchor="middle">role = admin?</text>
  <line x1="530" y1="280" x2="558" y2="280" stroke="#d9544e" stroke-width="1.5" marker-end="url(#arRed)"/>
  <line x1="380" y1="308" x2="380" y2="334" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 4 -->
  <rect x="230" y="334" width="300" height="56" rx="8" fill="#10171f" stroke="#2a3441" stroke-width="1"/>
  <text x="380" y="358" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Admin MFA check</text>
  <text x="380" y="376" fill="#8b98a5" font-size="11" text-anchor="middle">fresh DB read · mfaEnabled?</text>
  <line x1="530" y1="362" x2="558" y2="362" stroke="#d9544e" stroke-width="1.5" marker-end="url(#arRed)"/>
  <line x1="380" y1="390" x2="380" y2="416" stroke="#19c37d" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- step 5 allowed -->
  <rect x="230" y="416" width="300" height="56" rx="8" fill="#0e1a14" stroke="#19c37d" stroke-width="1"/>
  <text x="380" y="440" fill="#19c37d" font-size="13" font-weight="600" text-anchor="middle">Allowed</text>
  <text x="380" y="458" fill="#7fae97" font-size="11" text-anchor="middle">controller + service run</text>

  <!-- reject boxes -->
  <rect x="560" y="170" width="170" height="56" rx="8" fill="#1a1012" stroke="#d9544e" stroke-width="1"/>
  <text x="645" y="194" fill="#f0a8a4" font-size="13" font-weight="600" text-anchor="middle">401</text>
  <text x="645" y="212" fill="#c98f8b" font-size="11" text-anchor="middle">unauthorized</text>

  <rect x="560" y="252" width="170" height="56" rx="8" fill="#1a1012" stroke="#d9544e" stroke-width="1"/>
  <text x="645" y="276" fill="#f0a8a4" font-size="13" font-weight="600" text-anchor="middle">403</text>
  <text x="645" y="294" fill="#c98f8b" font-size="11" text-anchor="middle">not an admin</text>

  <rect x="560" y="334" width="170" height="56" rx="8" fill="#1a1012" stroke="#d9544e" stroke-width="1"/>
  <text x="645" y="358" fill="#f0a8a4" font-size="13" font-weight="600" text-anchor="middle">403</text>
  <text x="645" y="376" fill="#c98f8b" font-size="11" text-anchor="middle">enable MFA first</text>

  <text x="40" y="508" fill="#8b98a5" font-size="12">Normal users and the simulator's victim accounts stay password-only, so the attack range keeps working.</text>
</svg>
