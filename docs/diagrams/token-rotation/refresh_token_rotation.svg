<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#5b6b7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="400" rx="10" fill="#0b0f14"/>
  <text x="40" y="40" fill="#19c37d" font-size="18" font-weight="600">Refresh-token rotation &amp; replay protection</text>
  <text x="40" y="62" fill="#8b98a5" font-size="12">Every refresh mints a brand-new pair and retires the old one; reusing an old token is caught.</text>

  <rect x="280" y="80" width="200" height="56" rx="8" fill="#10171f" stroke="#2a3441"/>
  <text x="380" y="102" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">POST /auth/refresh</text>
  <text x="380" y="120" fill="#8b98a5" font-size="11" text-anchor="middle">presents a refresh token</text>
  <line x1="380" y1="136" x2="380" y2="170" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="280" y="170" width="200" height="56" rx="8" fill="#10171f" stroke="#2a3441"/>
  <text x="380" y="192" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Validate</text>
  <text x="380" y="210" fill="#8b98a5" font-size="11" text-anchor="middle">hash match · jti = current?</text>
  <line x1="380" y1="226" x2="205" y2="300" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="380" y1="226" x2="555" y2="300" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="70" y="300" width="270" height="56" rx="8" fill="#0e1a14" stroke="#19c37d"/>
  <text x="205" y="322" fill="#19c37d" font-size="13" font-weight="600" text-anchor="middle">Rotate &amp; issue</text>
  <text x="205" y="340" fill="#7fae97" font-size="11" text-anchor="middle">new access + refresh · old jti retired</text>

  <rect x="420" y="300" width="270" height="56" rx="8" fill="#1a1012" stroke="#d9544e"/>
  <text x="555" y="322" fill="#f0a8a4" font-size="13" font-weight="600" text-anchor="middle">Replay detected</text>
  <text x="555" y="340" fill="#c98f8b" font-size="11" text-anchor="middle">revoke session · REFRESH_REUSE</text>

  <text x="40" y="384" fill="#8b98a5" font-size="12">Concurrent refreshes race: one wins the atomic rotation, the rest are rejected (REFRESH_RACE).</text>
</svg>
