<svg xmlns="http://www.w3.org/2000/svg" width="760" height="470" viewBox="0 0 760 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#5b6b7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#0b0f14"/>
  <text x="40" y="40" fill="#19c37d" font-size="18" font-weight="600">GeoIP &amp; impossible-travel — detection flow</text>
  <text x="40" y="62" fill="#8b98a5" font-size="12">Each login is located from its IP; a new login is compared to the user's last one.</text>

  <rect x="280" y="88" width="200" height="52" rx="8" fill="#10171f" stroke="#2a3441"/>
  <text x="380" y="108" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Login</text>
  <text x="380" y="126" fill="#8b98a5" font-size="11" text-anchor="middle">IP captured (X-Forwarded-For)</text>
  <line x1="380" y1="140" x2="380" y2="160" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="280" y="160" width="200" height="52" rx="8" fill="#10171f" stroke="#2a3441"/>
  <text x="380" y="180" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Resolve location</text>
  <text x="380" y="198" fill="#8b98a5" font-size="11" text-anchor="middle">IP → country, lat/lon</text>
  <line x1="380" y1="212" x2="380" y2="232" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="280" y="232" width="200" height="52" rx="8" fill="#10171f" stroke="#2a3441"/>
  <text x="380" y="252" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Stamp on session</text>
  <text x="380" y="270" fill="#8b98a5" font-size="11" text-anchor="middle">country, city, lat, lon</text>
  <line x1="380" y1="284" x2="380" y2="304" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="280" y="304" width="200" height="52" rx="8" fill="#10171f" stroke="#2a3441"/>
  <text x="380" y="324" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Compare to last login</text>
  <text x="380" y="342" fill="#8b98a5" font-size="11" text-anchor="middle">distance ÷ time = speed</text>
  <line x1="380" y1="356" x2="205" y2="386" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="380" y1="356" x2="555" y2="386" stroke="#5b6b7a" stroke-width="1.5" marker-end="url(#ar)"/>

  <rect x="80" y="386" width="250" height="52" rx="8" fill="#0e1a14" stroke="#19c37d"/>
  <text x="205" y="406" fill="#19c37d" font-size="13" font-weight="600" text-anchor="middle">Plausible</text>
  <text x="205" y="424" fill="#7fae97" font-size="11" text-anchor="middle">just record the location</text>

  <rect x="430" y="386" width="250" height="52" rx="8" fill="#1a1012" stroke="#d9544e"/>
  <text x="555" y="406" fill="#f0a8a4" font-size="13" font-weight="600" text-anchor="middle">Impossible travel</text>
  <text x="555" y="424" fill="#c98f8b" font-size="11" text-anchor="middle">HIGH event + risk spike</text>
</svg>
